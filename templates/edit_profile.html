{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto mt-16 p-6 bg-black/80 backdrop-blur-md rounded-xl shadow-lg text-white">

    <h2 class="text-2xl font-bold mb-6">Edit Profile</h2>

    <form method="POST" class="space-y-4">

        <!-- Username -->
        <div>
            <label class="block mb-1 font-semibold">Username</label>
            <input type="text"
                   name="username"
                   value="{{ user.username }}"
                   class="w-full px-4 py-2 rounded-lg bg-black border border-gray-600 focus:border-brandRed focus:outline-none"
                   required>
        </div>

        <!-- Display Name -->
        <div>
            <label class="block mb-1 font-semibold">Display Name</label>
            <input type="text"
                   name="display_name"
                   value="{{ profile.display_name }}"
                   class="w-full px-4 py-2 rounded-lg bg-black border border-gray-600 focus:border-brandRed focus:outline-none">
        </div>

        <!-- Bio -->
        <div>
            <label class="block mb-1 font-semibold">Bio</label>
            <textarea name="bio"
                      rows="4"
                      class="w-full px-4 py-2 rounded-lg bg-black border border-gray-600 focus:border-brandRed focus:outline-none">{{ profile.bio }}</textarea>
        </div>

        <!-- City -->
        <div>
            <label class="block mb-1 font-semibold">City</label>
            <input type="text"
                   name="city"
                   value="{{ profile.city }}"
                   class="w-full px-4 py-2 rounded-lg bg-black border border-gray-600 focus:border-brandRed focus:outline-none">
        </div>

        <!-- Mood -->
        <div>
            <label class="block mb-1 font-semibold">Mood</label>
            <input type="text"
                   name="mood"
                   value="{{ profile.mood }}"
                   class="w-full px-4 py-2 rounded-lg bg-black border border-gray-600 focus:border-brandRed focus:outline-none">
        </div>

        <!-- Submit -->
        <button type="submit"
                class="px-6 py-2 bg-brandRed text-white rounded-full hover:bg-white hover:text-black transition mt-4">
            Save Changes
        </button>

    </form>

</div>
{% endblock %}
